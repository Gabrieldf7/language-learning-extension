<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangLearn — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #101014;
      color: #e0e0e6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 28px;
    }

    .card {
      background: #18181c;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .card-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .card-desc a {
      color: #7c8aff;
      text-decoration: none;
    }
    .card-desc a:hover { text-decoration: underline; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    select,
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      color: #e0e0e6;
      font-size: 13px;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input[type="password"] {
      font-family: "Cascadia Code", "Fira Code", monospace;
    }

    select { cursor: pointer; }

    select:focus,
    input:focus {
      border-color: rgba(124, 138, 255, 0.4);
      box-shadow: 0 0 0 2px rgba(124, 138, 255, 0.08);
    }

    .field-group {
      margin-bottom: 12px;
    }

    .provider-info {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
      line-height: 1.5;
    }
    .provider-info a { color: #7c8aff; text-decoration: none; }
    .provider-info a:hover { text-decoration: underline; }

    .provider-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 600;
      margin-left: 5px;
    }
    .badge-recommended {
      background: rgba(74, 222, 128, 0.1);
      color: #4ade80;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      flex: 1;
      padding: 9px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-save {
      background: #7c8aff;
      color: white;
    }
    .btn-save:hover {
      background: #8b97ff;
    }

    .btn-clear {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      flex: 0.4;
    }
    .btn-clear:hover {
      background: rgba(255,255,255,0.08);
      color: #fca5a5;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #22c55e;
      color: white;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error {
      background: #ef4444;
    }

    .key-status {
      font-size: 11px;
      margin-top: 6px;
      color: rgba(255,255,255,0.3);
    }
    .key-status.active {
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ LangLearn Settings</h1>
    <p class="subtitle">Configure AI-powered features for your reading experience.</p>

    <div class="card">
      <div class="card-title">✨ AI Context Translation</div>
      <p class="card-desc">
        Enable AI-powered sentence translation and grammar explanations directly in the tooltip.
      </p>

      <div class="field-group">
        <label for="ai-provider">Provider</label>
        <select id="ai-provider">
          <option value="groq">Groq (Llama 3.3 70B) — Fast &amp; Free</option>
          <option value="gemini">Google Gemini 2.0 Flash</option>
        </select>
        <div class="provider-info" id="provider-info"></div>
      </div>

      <div class="field-group">
        <label for="ai-key">API Key</label>
        <input type="password" id="ai-key" placeholder="" autocomplete="off" spellcheck="false">
        <div class="key-status" id="key-status">No key configured</div>
      </div>

      <div class="btn-row">
        <button class="btn-save" id="btn-save">Save</button>
        <button class="btn-clear" id="btn-clear">Clear</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="options.js"></script>
</body>
</html>
