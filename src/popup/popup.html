<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangLearn</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ── Header ── -->
  <header id="header">
    <div class="header-left">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor" opacity="0.9"/>
        <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>LangLearn</h1>
    </div>
    <div id="status-badge" class="status-badge status-connecting" title="Checking connection…">
      <span class="status-dot"></span>
      <span id="status-text">Connecting</span>
    </div>
  </header>

  <!-- ── Offline Banner ── -->
  <div id="offline-banner" class="banner banner-error" hidden>
    <p>Anki is not running. Please open Anki with AnkiConnect installed.</p>
    <button id="btn-retry" class="btn btn-small">Retry</button>
  </div>

  <!-- ── Main Content ── -->
  <main id="main-content">
    <!-- Deck Selector -->
    <div class="field-group">
      <label for="deck-select">Deck</label>
      <select id="deck-select" disabled>
        <option value="">Loading decks…</option>
      </select>
      <div class="field-row">
        <button id="btn-sync" class="btn btn-secondary btn-small" disabled>Sync from Anki</button>
        <span id="sync-status" class="field-hint"></span>
      </div>
    </div>

    <!-- Audio Capture -->
    <div class="field-group">
      <label>Tab Audio</label>
      <div class="field-row">
        <button id="btn-record" class="btn btn-secondary btn-small" disabled>🎙 Record Tab Audio</button>
        <span id="record-status" class="field-hint"></span>
      </div>
      <p class="field-hint">Start recording to capture audio for Anki cards.</p>
    </div>

    <hr class="divider">

    <!-- Appearance Settings -->
    <div class="field-group">
      <label>Appearance</label>
      <div class="setting-row">
        <span class="setting-label">Font Size</span>
        <input type="range" id="setting-font-size" min="12" max="48" value="24">
      </div>
      <div class="setting-row">
        <span class="setting-label">Text Color</span>
        <input type="color" id="setting-text-color" value="#ffffff">
      </div>
      <div class="setting-row">
        <span class="setting-label">Background</span>
        <input type="color" id="setting-bg-color" value="#1a1a2e">
      </div>
    </div>

    <hr class="divider">

    <!-- Local Audio Server -->
    <div class="field-group">
      <label>Local Audio Server</label>
      <div class="field-row">
        <input type="checkbox" id="cb-local-audio">
        <span class="setting-label">Enable</span>
      </div>
      <input type="text" id="field-local-audio-url" placeholder="http://127.0.0.1:5050/?term={term}&reading={reading}" autocomplete="off">
    </div>

    <hr class="divider">

    <!-- Card Fields -->
    <div class="field-group">
      <label for="field-word">Word</label>
      <input type="text" id="field-word" placeholder="食べる" autocomplete="off">
    </div>

    <div class="field-group">
      <label for="field-reading">Reading</label>
      <input type="text" id="field-reading" placeholder="たべる" autocomplete="off">
    </div>

    <div class="field-group">
      <label for="field-sentence">Sentence</label>
      <textarea id="field-sentence" rows="2" placeholder="毎日ご飯を食べる。"></textarea>
    </div>

    <!-- Add Button -->
    <button id="btn-add" class="btn btn-primary" disabled>Add Card</button>

    <!-- Feedback -->
    <div id="feedback" class="feedback" hidden></div>
  </main>

  <script src="popup.js" type="module"></script>
</body>
</html>
